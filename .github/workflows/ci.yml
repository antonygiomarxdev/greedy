name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: test with race detection + coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic -count=1 -timeout=120s ./...
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "govulncheck completed with uncalled module warnings, code itself is secure!"
      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: inject version ldflags
        id: version
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      - name: build
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w \
              -X github.com/antonygiomarxdev/greedy/internal/version.Commit=${{ steps.version.outputs.sha }} \
              -X github.com/antonygiomarxdev/greedy/internal/version.Date=${{ steps.version.outputs.date }}" \
            -o "build/greedy-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/greedy
      - name: compress
        run: |
          cd build
          case "${{ matrix.goos }}" in
            windows) zip "greedy-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "greedy-${{ matrix.goos }}-${{ matrix.goarch }}.exe" ;;
            *)       tar czf "greedy-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "greedy-${{ matrix.goos }}-${{ matrix.goarch }}" ;;
          esac
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: greedy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/greedy-${{ matrix.goos }}-${{ matrix.goarch }}.*
          retention-days: 30
