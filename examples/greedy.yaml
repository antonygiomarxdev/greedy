data_dir: /home/pi/.greedy
bots:
  - id: dca-btc
    name: "BTC DCA"
    exchange: paper
    strategy:
      type: dca
      symbol: BTC-USD
      params:
        base_order_size: 100
        frequency: "1h"
        safety_orders:
          - price_deviation_pct: -5
            volume_scale: 1.5
          - price_deviation_pct: -10
            volume_scale: 2.0
        max_safety_orders: 5

  - id: grid-eth
    name: "ETH GRID"
    exchange: paper
    strategy:
      type: grid
      symbol: ETH-USD
      params:
        lower_bound: 2000
        upper_bound: 4000
        grid_levels: 10
        order_size: 0.5
